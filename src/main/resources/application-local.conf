# Lastes automatisk når ktor.environment=local (default i application.conf).
# Aktiv når applikasjonen kjøres lokalt uten NAIS_CLUSTER_NAME satt.
# Se PropertiesConfig.mergeWithEnv() for miljøvalg-logikken.
include file("application.conf")

application {
    profile = LOCAL
    useAuthentication = false
}
