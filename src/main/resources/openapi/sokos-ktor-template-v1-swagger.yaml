openapi: 3.0.1
info:
  version: 1.0.0
  title: Sokos Ktor Template API
  description: Mal-tjeneste for Team Motta og Beregne — brukes som utgangspunkt for nye Ktor-tjenester
  contact:
    name: Team Motta og Beregne
    email: okonomi@nav.no
    url: https://nav-it.slack.com/archives/CKZADNFBP

tags:
  - name: Dummy
    description: Eksempel-endepunkter fra template

servers:
  - url: /api/v1

paths:

  /hello:
    get:
      tags:
        - dummy
      summary: Hent melding fra template
      description: Returnerer en eksempel-melding som bekrefter at tjenesten kjører
      operationId: getHello
      responses:
        200:
          description: OK - Returnerer melding fra tjenesten
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DummyDomain'
        401:
          description: Ingen tilgang
        500:
          description: Annen feil
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
      security:
        - Bearer: [ ]

components:
  schemas:

    DummyDomain:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: "This is a template for Team Motta og Beregne"
          description: Melding fra tjenesten

    ApiError:
      type: object
      required:
        - timestamp
        - status
        - error
        - message
        - path
      properties:
        timestamp:
          type: string
          format: date-time
          description: Tidspunkt feilen oppsto
        status:
          type: integer
          example: 500
          description: HTTP status kode
        error:
          type: string
          example: Internal Server Error
          description: En kort, lesbar oppsummering av problemet
        message:
          type: string
          example: Det skjedde en feil
          description: En lesbar forklaring som er spesifikk for denne forekomsten av problemet
        path:
          type: string
          example: /api/v1/hello
          description: Endepunktet hvor feilen oppsto

  securitySchemes:
    Bearer:
      type: apiKey
      description: |-
        OBO-token (JWT via OAuth2.0).<br>
          Følgende format må brukes i input-feltet "Value" under: <strong>"Bearer {token}"</strong>.<br>
          Eksempel på verdi i input-felt: <strong>Bearer eYdmifml0ejugm</strong>
      name: Authorization
      in: header
